# PiSmartSite — NestJS + Next.js avec MongoDB Atlas (pas de Mongo en conteneur)
#
# Déploiement type DevOps Jenkins : même images Docker Hub (ex. missaouimourad/pismartsite-backend:TAG)
# avec NEXT_PUBLIC_API_URL alignée sur l’URL réelle vue par le navigateur (voir variable de job Jenkins).
#
# Réseau : backend et frontend sur `pismartsite-net` (external: true) :
#   docker network create pismartsite-net
#
# Backend : Nest — variables dans smartsite-backend/.env (voir env_file ci‑dessous).
# Frontend : OpenRouter etc. dans smarsite-frontend/.env.local (routes API Next).
#
# Copie locale des images Hub dans le projet :
#   .\scripts\save-pismartsite-images.ps1  → docker-images/pismartsite-stack.tar
#
# Démarrage :
#   docker compose up -d
#   docker compose up -d --build

name: pismartsite

services:
  backend:
    build:
      context: ./smartsite-backend
    image: ${BACKEND_IMAGE:-missaouimourad/pismartsite-backend:55-72bf0631}
    restart: unless-stopped
    env_file:
      - ./smartsite-backend/.env
    networks:
      - pismartsite-net
    ports:
      - "3200:3200"
    volumes:
      # Fichiers uploadés (photos chantier, progress, humains…) : visibles dans le dépôt et persistants.
      - ./smartsite-backend/uploads:/app/uploads
    environment:
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000

  frontend:
    build:
      context: ./smarsite-frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3200}
    image: ${FRONTEND_IMAGE:-missaouimourad/pismartsite-frontend:55-72bf0631}
    restart: unless-stopped
    env_file:
      - ./smarsite-frontend/.env.local
    networks:
      - pismartsite-net
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      # Next `next start` relit env : rewrites `/api-backend` → cette cible (évite 127.0.0.1 dans le conteneur).
      BACKEND_PROXY_TARGET: http://backend:3200
      INTERNAL_API_URL: http://backend:3200

networks:
  pismartsite-net:
    name: pismartsite-net
    external: true
