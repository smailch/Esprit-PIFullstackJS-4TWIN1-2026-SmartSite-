# SonarQube — PiSmartSite (monorepo NestJS + Next.js)
# Usage : lancer les tests avec couverture PUIS sonar-scanner à la racine du dépôt.
# Remplacez la clé / le host si votre instance n’est pas en local.

sonar.projectKey=pismartsite
sonar.projectName=PiSmartSite

# Racine d’analyse (où se trouve ce fichier)
sonar.projectBaseDir=.

# Dépôts source (exclusions ci-dessous éliminent node_modules, builds, etc.)
sonar.sources=smartsite-backend,smarsite-frontend

sonar.exclusions=**/node_modules/**,\
  **/dist/**,\
  **/.next/**,\
  **/coverage/**,\
  **/.turbo/**,\
  **/reports/**,\
  **/*.min.js

# (Optionnel) Cibler explicitement des tests pour les métriques de tests
# sonar.tests=smartsite-backend,smarsite-frontend
# sonar.test.inclusions=**/*.spec.ts,**/*.spec.tsx,**/*test.ts,**/*test.tsx

# Couverture Jest (backend) + Vitest v8 (frontend) — générée par npm run test:cov dans chaque dossier
sonar.javascript.lcov.reportPaths=smartsite-backend/coverage/lcov.info,smarsite-frontend/coverage/lcov.info

# Pas de sonar.testExecutionReportPaths : Jest/Vitest produisent du JUnit "testsuites", pas le format
# Generic Test Execution requis par SonarQube 9.x. Les rapports restent utiles (Jenkins, etc.).

# TypeScript (SonarQube 9.x) : tsconfig aligné sur un analyseur embarqué plus ancien que le build Next/Nest
sonar.typescript.tsconfigPath=tsconfig.sonar.json

# Tailwind v4 : @custom-variant / @theme ne sont pas reconnus par l’analyseur CSS (faux positifs bug css:S4662)
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=css:S4662
sonar.issue.ignore.multicriteria.e1.resourceKey=**/globals.css

# CPD (duplication) : composants shadcn / Radix + hooks utilitaires = patterns répétitifs ; exclu du % pour le Quality Gate
sonar.cpd.exclusions=smarsite-frontend/components/ui/**,smarsite-frontend/hooks/**

# Couverture : pages / layouts Next (hors `app/api`) et shadcn exclues — LCOV aligné avec vitest `coverage.include`.
sonar.coverage.exclusions=smarsite-frontend/app/page.*,\
  smarsite-frontend/app/layout.*,\
  smarsite-frontend/app/**/page.*,\
  smarsite-frontend/app/**/layout.*,\
  smarsite-frontend/app/dream-house/**,\
  smarsite-frontend/components/ui/**,\
  smarsite-frontend/components/dream-house/**,\
  smarsite-frontend/app/api/gemini/**,\
  **/mockData.ts,\
  **/mockStore.ts

# Encodage
sonar.sourceEncoding=UTF-8
