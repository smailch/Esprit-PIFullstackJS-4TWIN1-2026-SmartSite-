# Déploiements backend + frontend (MongoDB Atlas + secret Jenkins / ops).
# Remplacements d’images : scripts/jenkins-k8s-deploy.sh (tags Docker Hub CI).
#
# Obligatoire avant apply (sans Mongo en cluster) :
#   kubectl create secret generic pismartsite-runtime \
#     --from-literal=MONGODB_URI='mongodb+srv://USER:PASSWORD@CLUSTER.mongodb.net/smartsite?retryWrites=true&w=majority'
# Adapter aussi CORS_ORIGINS pour l’URL publique réelle du navigateur si besoin.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: pismartsite
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pismartsite
      component: backend
  template:
    metadata:
      labels:
        app: pismartsite
        component: backend
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: backend
          image: pismartsite-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3200
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: pismartsite-runtime
                  key: MONGODB_URI
            - name: CORS_ORIGINS
              value: "http://127.0.0.1:3000,http://localhost:3000,http://localhost:30080"
            - name: GROQ_API_KEY
              value: ""
            - name: AI_ANALYSIS_URL
              value: "http://127.0.0.1:8001/analyze-image"
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
      volumes:
        - name: uploads
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: pismartsite
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pismartsite
      component: frontend
  template:
    metadata:
      labels:
        app: pismartsite
        component: frontend
    spec:
      containers:
        - name: frontend
          image: pismartsite-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: INTERNAL_API_URL
              value: "http://backend:3200"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
