# Deployments applicatifs (backend NestJS + frontend Next.js + IA YOLO).
# À appliquer avec substitution d’images (voir scripts/jenkins-k8s-deploy.sh) ou après
# `docker load …` avec les tags localement : pismartsite-*:latest .
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: pismartsite
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pismartsite
      component: backend
  template:
    metadata:
      labels:
        app: pismartsite
        component: backend
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: backend
          image: pismartsite-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3200
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: MONGODB_URI
              value: mongodb://mongodb:27017/smartsite
            - name: CORS_ORIGINS
              value: "http://127.0.0.1:3000,http://localhost:3000"
            - name: GROQ_API_KEY
              value: ""
            - name: AI_ANALYSIS_URL
              value: "http://smartsite-ai:8001/analyze-image"
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
      volumes:
        - name: uploads
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: pismartsite
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pismartsite
      component: frontend
  template:
    metadata:
      labels:
        app: pismartsite
        component: frontend
    spec:
      containers:
        - name: frontend
          image: pismartsite-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartsite-ai
  labels:
    app: pismartsite
    component: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pismartsite
      component: ai
  template:
    metadata:
      labels:
        app: pismartsite
        component: ai
    spec:
      containers:
        - name: ai
          image: pismartsite-ai:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
              name: http
          env:
            - name: YOLO_MODEL_PATH
              value: /app/weights/best.pt
          volumeMounts:
            - name: weights
              mountPath: /app/weights
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "500m"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi
      volumes:
        - name: weights
          emptyDir: {}
